<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lenskart</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="hero">

<img src="assets/leaves.jpg" class="leaf">
<div class="leaves"></div>

<h2 class="logo">LENSKART</h2>

<div class="glasses-container">
    <div class="float-box">
    <img id="glasses" src="assets/glasses/g1.png">
    </div>
</div>

<h1 class="tagline">
Glasses Badlo, Vibe Badlo
</h1>

<button class="explore"
onclick="scrollToCollection()">
Explore Collection
</button>

<nav class="navbar">
<div class="nav-logo">
<img src="https://assets.lenskart.com/images/2026/01/14/Vector-3.svg" alt="Lenskart logo">
</div>

<ul class="nav-links">
  
<li><a href="#">Home</a></li>
<li><a href="#">Stores</a></li>
<li><a href="#">Contact</a></li>
<li><a href="#">About us</a></li>
</ul>
</nav>
</section>

<section class="collection">

<h2 class="collection-title">FEATURED COLLECTION</h2>

<div class="cards">

<img src="assets/cards/card1.webp" class="card c1">
<img src="assets/cards/card2.webp" class="card c2">

<img src="assets/cards/main.webp" class="main-card">

<img src="assets/cards/card3.webp" class="card c3">
<img src="assets/cards/card4.jpeg" class="card c4"> 

</div>

</section>

<script src="script.js"></script>

</body>
</html>
